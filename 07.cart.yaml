- name: configure cart server
  hosts: cart
  become: yes
  tasks:
  - name: enabling nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs
    package:
     name: nodejs
     state: present
  - name: creating user
    user:
     name: roboshop
     system: true
     home: /app
     shell: /sbin/nologin
     comment: "Roboshop System user"
  - name: delete app
    file:
      path: /app
      state: absent
  - name: delete cart.zip
    file:
      path: /tmp/cart.zip
      state: absent
  - name:  creating app dir
    file:
      path: /app
      state: directory
  - name: get cart
    get_url:
      url:  https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip
  - name: unzip cart
    unarchive:
     src: /tmp/cart.zip
     dest: /app
     remote_src: yes
  - name: dependencies install
    community.general.npm:
      path: /app
  - name: copy  cart service
    template:
      src: cart.service.j2
      dest: /etc/systemd/system/cart.service
  - name: deamon reload
    systemd_service:
      name: cart
      daemon_reload: true
  - name: enable and restart service
    service:
      name: cart
      state: restarted
      enabled: yes