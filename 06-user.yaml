- name: configure user server
  hosts: user
  become: yes
  tasks:
  - name: enabling nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs
    package:
     name: nodejs
     state: present
  - name: creating user
    user:
     name: roboshop
     system: true
     home: /app
     shell: /sbin/nologin
     comment: "Roboshop System user"
  - name: delete app
    file:
      path: /app
      state: absent
  - name: delete user.zip
    file:
      path: /tmp/user.zip
      state: absent
  - name:  creating app dir
    file:
      path: /app
      state: directory
  - name: get user
    get_url:
      url:  https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip
  - name: unzip user
    unarchive:
     src: /tmp/user.zip
     dest: /app
     remote_src: yes
  - name: dependencies install
    community.general.npm:
      path: /app
  - name: copy user service
    template:
      src: user.service.j2
      dest: /etc/systemd/system/user.service
  - name: deamon reload
    systemd_service:
      name: catalogue
      daemon_reload: true
  - name: enable and restart service
    service:
      name: user
      state: restart
      enabled: yes